<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HLL Command Center</title>
    <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --accent: #ac2e2e;
            --bg: #090c12;
            --nav-bg: rgba(0, 0, 0, 0.8);
        }
        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg); font-family: 'Oswald', sans-serif; overflow: hidden; }
        
        /* Navigation Bar */
        nav {
            position: fixed; top: 0; left: 0; width: 100%; height: 60px;
            background: var(--nav-bg); border-bottom: 2px solid var(--accent);
            display: flex; justify-content: center; align-items: center; z-index: 100;
        }
        nav a {
            color: white; text-decoration: none; padding: 10px 30px;
            text-transform: uppercase; letter-spacing: 2px; font-weight: 700;
            transition: 0.3s; cursor: pointer;
        }
        nav a:hover, nav a.active { color: var(--accent); background: rgba(255,255,255,0.05); }

        /* Dashboard Container */
        .viewport {
            width: 100vw; height: calc(100vh - 60px); margin-top: 60px;
            border: none; display: block;
        }
    </style>
</head>
<body>

<nav>
    <a onclick="loadBoard('code1.html', this)" class="active">Kill Feed</a>
    <a onclick="loadBoard('code2.html', this)">Team Stats</a>
    <a onclick="loadBoard('code3.html', this)">AT Leaderboard</a>
</nav>

<iframe id="dash-frame" src="code1.html" class="viewport"></iframe>

<script>
    function loadBoard(url, el) {
        document.getElementById('dash-frame').src = url;
        document.querySelectorAll('nav a').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
    }
</script>
</body>
</html>
