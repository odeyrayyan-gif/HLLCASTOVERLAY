<!DOCTYPE html>
<html>
<head>
    <style>
        body { 
            margin: 0; 
            padding: 0; 
            overflow: hidden; 
            background: transparent; 
            font-family: 'Segoe UI', sans-serif;
            color: white;
        }

        .ticker-wrap {
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 50px; 
            background: rgba(0, 0, 0, 0.9);
            border-top: 2px solid #ff9d00;
            display: flex;
            overflow: hidden; 
        }

        .ticker-move {
            display: flex;
            white-space: nowrap;
            /* 30s speed - higher is slower */
            animation: ticker-loop 30s linear infinite;
        }

        @keyframes ticker-loop {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }

        .player-entry {
            display: inline-flex;
            align-items: center;
            padding: 0 30px; 
            font-size: 22px;
        }

        .rank {
            background: #ff9d00;
            color: black;
            font-weight: 900;
            padding: 1px 8px;
            border-radius: 3px;
            margin-right: 10px;
            font-size: 18px;
        }

        .name { font-weight: 800; color: #fff; margin-right: 12px; }
        .stat-label { color: #888; margin-right: 4px; font-size: 15px; }
        .stat-val { color: #ff9d00; font-weight: bold; margin-right: 15px; }
        .divider { color: rgba(255,255,255,0.3); }
    </style>
</head>
<body>

<div class="ticker-wrap">
    <div id="ticker" class="ticker-move"></div>
</div>

<script>
    const SETTINGS_FILE = "dashboard_settings.json"; // Updated from config.txt

    async function fetchNoCache(url) {
        const sep = url.includes("?") ? "&" : "?";
        return fetch(url + sep + "t=" + Date.now(), { cache: "no-store" });
    }

    async function getEndpoint() {
        try {
            const r = await fetchNoCache(SETTINGS_FILE);
            if (!r.ok) return "";
            const settings = await r.json(); // Parse JSON file
            return settings.api_endpoint || ""; // Return specific endpoint property
        } catch { return ""; }
    }

    async function updateTicker() {
        try {
            const endpoint = await getEndpoint();
            if (!endpoint) return;

            const res = await fetchNoCache(endpoint);
            const data = await res.json();
            const stats = data?.result?.stats;

            if (Array.isArray(stats)) {
                const topKillers = stats
                    .sort((a, b) => b.kills - a.kills)
                    .slice(0, 5);
                
                const playerHtml = topKillers.map((p, index) => `
                    <div class="player-entry">
                        <span class="rank">${index + 1}</span>
                        <span class="name">${p.player}</span>
                        <span class="stat-label">K:</span><span class="stat-val">${p.kills}</span>
                        <span class="stat-label">CBT:</span><span class="stat-val">${p.combat}</span>
                        <span class="divider"> // </span>
                    </div>
                `).join('');

                const ticker = document.getElementById('ticker');
                // Duplicate the HTML to create a seamless infinite loop
                ticker.innerHTML = playerHtml + playerHtml;
            }
        } catch (e) { 
            console.error("Ticker update failed"); 
        }
    }

    // Refresh data every 2 minutes
    setInterval(updateTicker, 120000);
    updateTicker();
</script>
</body>
</html>
